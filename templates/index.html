<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Arbitraj Skaneri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; }
        .table-dark { background-color: #1e1e1e; }
    </style>
    <script>
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                let tableHTML = "";
                if(data.length === 0) {
                    tableHTML = `<tr><td colspan="5" class="text-center text-muted">Hazırda limitlərə uyğun arbitraj yoxdur...</td></tr>`;
                } else {
                    data.forEach(row => {
                        tableHTML += `
                            <tr>
                                <td><strong>${row.token}</strong></td>
                                <td class="text-success">${row.buy_ex} <br> <small>${row.buy_p}</small></td>
                                <td class="text-danger">${row.sell_ex} <br> <small>${row.sell_p}</small></td>
                                <td><strong class="text-warning">${row.diff.toFixed(2)}%</strong></td>
                                <td>${row.tp_price.toFixed(4)}</td>
                            </tr>
                        `;
                    });
                }
                document.getElementById('arb-table-body').innerHTML = tableHTML;
            } catch (error) {
                console.error('Məlumat yenilənmədi:', error);
            }
        }
        setInterval(fetchData, 3000); // 3 saniyədən bir yenilə
        window.onload = fetchData;
    </script>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">⚡ Canlı Futures Arbitraj (OKX Mərkəzli)</h2>
        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover text-center align-middle">
                <thead>
                    <tr>
                        <th>Token</th>
                        <th>Alınacaq Birja / Qiymət</th>
                        <th>Satılacaq Birja / Qiymət</th>
                        <th>Faiz Fərqi</th>
                        <th>Təxmini TP (Orta)</th>
                    </tr>
                </thead>
                <tbody id="arb-table-body">
                    <tr><td colspan="5">Skaner işə düşür... Gözləyin.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
